<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient (Fast, dynamic orange/gold) -->
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>

    <!-- Primary Logo Gradient (Speed/Efficiency: Bright Orange to Red) -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Scan Trail Gradient (Fading red/orange top-down blur) -->
    <linearGradient id="scanTrail" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.3" />
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#991b1b" flood-opacity="0.2" />
    </filter>
   
    <!-- Blur filter for the laser trail -->
    <filter id="blurTrail" x="0" y="-50%" width="100%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Scanning Frame (representing the AI/OCR scan feature), changed to warm colors -->
  <path d="M 140 120 L 120 120 C 103.4 120 90 133.4 90 150 L 90 170" fill="none" stroke="#f59e0b" stroke-width="24" stroke-linecap="round" />
  <path d="M 372 120 L 392 120 C 408.6 120 422 133.4 422 150 L 422 170" fill="none" stroke="#f59e0b" stroke-width="24" stroke-linecap="round" />
  <path d="M 140 392 L 120 392 C 103.4 392 90 378.6 90 362 L 90 342" fill="none" stroke="#ef4444" stroke-width="24" stroke-linecap="round" />
  <path d="M 372 392 L 392 392 C 408.6 392 422 378.6 422 362 L 422 342" fill="none" stroke="#ef4444" stroke-width="24" stroke-linecap="round" />

  <!-- Central Skin Drop / Graph Metric Icon (From Original) -->
  <g filter="url(#dropShadow)" transform="translate(156, 140)">
    <!-- Droplet shape representing Skincare/Serums -->
    <path fill="url(#boltGrad)" d="M 100 0 C 100 0 20 110 20 160 C 20 204.183 55.817 240 100 240 C 144.183 240 180 204.183 180 160 C 180 110 100 0 100 0 Z" />
    
    <!-- Abstract 'Graph' Metric Line inside the droplet -->
    <path fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" d="M 60 160 L 85 130 L 110 170 L 140 120" />
    <circle cx="140" cy="120" r="10" fill="#ffffff" />
  </g>

  <!-- Fast Scanning Laser Effect -->
  <g>
    <!-- Scanned Area Blur Trail (Fading top-down) -->
    <!-- The laser is at y=280, so the trail goes from ~130 down to 280 -->
    <rect x="120" y="130" width="272" height="150" fill="url(#scanTrail)" filter="url(#blurTrail)" />
    
    <!-- Heavy Laser Core Line -->
    <rect x="136" y="280" width="240" height="6" rx="3" fill="#ef4444" />
    
    <!-- Laser Soft Outer Glow -->
    <rect x="126" y="270" width="260" height="26" rx="13" fill="#ef4444" opacity="0.4" filter="url(#blurTrail)" />
  </g>
</svg>
